
plugins {
    id 'com.android.application'
}

android {
    namespace 'com.piyush.attendance'
    compileSdk 34

    defaultConfig {
        applicationId "com.piyush.attendance"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            debuggable true
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
}
